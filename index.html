<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>PicoTune</title>
  <meta name="theme-color" content="#0d0f1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PicoTune" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-180.png" />
  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">♬</span>
      <h1>PicoTune</h1>
    </div>
    <div class="transport">
      <button id="play" class="play" aria-label="Lecture">▶</button>
      <div class="ctrl bpm-ctrl">
        <label for="bpm">BPM <strong id="bpm-val">120</strong></label>
        <input id="bpm" type="range" min="40" max="240" step="1" value="120" />
      </div>
      <div class="ctrl">
        <label for="steps">Pas</label>
        <select id="steps"></select>
      </div>
      <button id="clear" class="ghost" aria-label="Effacer">⌫</button>
    </div>
  </header>

  <section id="song" class="song"></section>

  <main id="tracks" class="tracks"></main>

  <footer class="hint">
    Motifs A/B/C · enchaîne-les dans la chaîne · pinceau Majeur/Mineur pour les accords · ▶ pour écouter
  </footer>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
